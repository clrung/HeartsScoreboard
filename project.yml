include:
  - project.local.yml

name: HeartsScoreboard
options:
  bundleIdPrefix: com.clrungdev
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    MARKETING_VERSION: "3.1.0"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_LANGUAGE: en
    knownRegions: ["en", "Base", "es", "fr", "it", "de", "pt", "ja", "ko", "zh-Hans", "nl"]
targets:
  HeartsScoreboard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clrungdev.Hearts-Scoreboard
        INFOPLIST_FILE: HeartsScoreboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeartsScoreboard/HeartsScoreboard.entitlements
    sources:
      - path: HeartsScoreboard
        excludes:
          - "Assets.xcassets/**"
          - "Localizations/**"
    resources:
      - path: HeartsScoreboard/Assets.xcassets
      - path: HeartsScoreboard/Localizations
        type: folder
    info:
      path: HeartsScoreboard/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: ""
